<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eventi Roseto degli Abruzzi & Dintorni</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f5f5f5;--card:#fff;--text:#222;--title:#1a1a2e;--sub:#666;--desc:#555;--meta:#888;--border:#e0e0e0;--search-bg:#fff;--tag-bg:#eef2ff;--tag:#4f46e5;--btn-bg:#fff;--btn-border:#ddd;--btn-hover:#e8e8e8;--shadow:rgba(0,0,0,.06);--shadow-hover:rgba(0,0,0,.1)}
  @media(prefers-color-scheme:dark){
    :root{--bg:#121212;--card:#1e1e1e;--text:#e4e4e4;--title:#f0f0f0;--sub:#aaa;--desc:#bbb;--meta:#999;--border:#333;--search-bg:#1e1e1e;--tag-bg:#1e293b;--tag:#93c5fd;--btn-bg:#2a2a2a;--btn-border:#444;--btn-hover:#3a3a3a;--shadow:rgba(0,0,0,.3);--shadow-hover:rgba(0,0,0,.4)}
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;transition:background .3s,color .3s}
  .container{max-width:960px;margin:0 auto;padding:1rem}
  h1{font-size:1.5rem;margin-bottom:.25rem;color:var(--title)}
  .subtitle{color:var(--sub);font-size:.9rem;margin-bottom:1rem}
  .search-bar{position:sticky;top:0;z-index:10;background:var(--search-bg);padding:.75rem;border-radius:12px;box-shadow:0 2px 8px var(--shadow);margin-bottom:1rem;transition:background .3s}
  #search{width:100%;padding:.7rem 1rem;border:2px solid var(--border);border-radius:8px;font-size:1rem;outline:none;transition:border-color .2s;background:var(--card);color:var(--text)}
  #search:focus{border-color:var(--title)}
  .filtri{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem}
  .filtri button{padding:.35rem .8rem;border:1px solid var(--btn-border);border-radius:20px;background:var(--btn-bg);cursor:pointer;font-size:.8rem;transition:all .2s;color:var(--text)}
  .filtri button.attivo{background:var(--title);color:#fff;border-color:var(--title)}
  .filtri button:hover:not(.attivo){background:var(--btn-hover)}
  .evento{background:var(--card);border-radius:12px;padding:1rem;margin-bottom:.75rem;box-shadow:0 1px 4px var(--shadow);transition:box-shadow .2s,background .3s}
  .evento:hover{box-shadow:0 3px 12px var(--shadow-hover)}
  .evento.hidden{display:none}
  .evento{position:relative;cursor:pointer}
  .evento a{text-decoration:none;color:inherit;display:block}
  .evento a::after{content:"🔗";position:absolute;top:.75rem;right:.75rem;font-size:.7rem;opacity:.4;transition:opacity .2s}
  .evento:hover a::after{opacity:.8}
  .evento .orario{display:inline-block;font-size:.75rem;color:var(--meta);background:var(--tag-bg);padding:.1rem .5rem;border-radius:6px;margin-bottom:.25rem}
  .evento .data{font-size:.8rem;color:#e94560;font-weight:600;margin-bottom:.2rem}
  .evento .titolo{font-size:1.05rem;font-weight:600;color:var(--title);margin-bottom:.2rem}
  .evento .luogo{font-size:.85rem;color:var(--meta);margin-bottom:.3rem}
  .evento .luogo::before{content:"📍 "}
  .evento .desc{font-size:.9rem;color:var(--desc)}
  .evento .etichette{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.5rem}
  .evento .etichetta{font-size:.7rem;padding:.15rem .55rem;border-radius:10px;background:var(--tag-bg);color:var(--tag)}
  .intestazione-comune{font-size:1.2rem;font-weight:700;color:var(--title);margin:1.5rem 0 .75rem;padding-bottom:.3rem;border-bottom:2px solid #e94560}
  .stats{text-align:center;font-size:.8rem;color:var(--meta);margin-bottom:1rem}
  #nessun-risultato{text-align:center;padding:2rem;color:var(--meta);display:none}
  .ad-banner{text-align:center;padding:1.5rem 1rem;margin:1.5rem 0;min-height:90px;background:var(--card);border-radius:12px;box-shadow:0 1px 4px var(--shadow);transition:background .3s;overflow:hidden}
  .ad-banner .ad-label{font-size:.65rem;color:var(--meta);text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem}
  .ad-banner ins{display:block}
  .ad-banner .adsbygoogle{max-width:100%;height:auto;min-height:90px}
  @media(max-width:768px){.ad-banner .adsbygoogle{width:100%;min-height:90px}}
  footer{text-align:center;font-size:.75rem;color:var(--meta);padding:1rem 0 2rem}
</style>
</head>
<body>
<div class="container">
  <h1>📅 Eventi Roseto & Dintorni</h1>
  <p class="subtitle">Eventi nel raggio di 25 km — aggiornato il <span id="aggiornato"></span></p>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Cerca evento, luogo, data…" autocomplete="off">
    <div class="filtri" id="filtri">
      <button data-filtro="tutti" class="attivo">Tutti</button>
      <button data-filtro="Roseto">Roseto</button>
      <button data-filtro="Silvi">Silvi</button>
      <button data-filtro="Giulianova">Giulianova</button>
      <button data-filtro="Pineto">Pineto</button>
      <button data-filtro="Tortoreto">Tortoreto</button>
      <button data-filtro="Mosciano">Mosciano</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>
  <div id="eventi"></div>
  <div id="nessun-risultato">Nessun evento trovato 😕</div>

  <!-- SPAZIO BANNER PUBBLICITARIO GOOGLE ADSENSE -->
  <div class="ad-banner">
    <div class="ad-label">Sponsor</div>
    <ins class="adsbygoogle"
         style="display:inline-block;width:728px;height:90px"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="XXXXXXXXXX"></ins>
  </div>

  <footer>Generato automaticamente — <a href="https://github.com/xellos81/roseto-eventi">GitHub</a></footer>
</div>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>

<script>

  {id:2,data:"15–18 Lug 2026",orario:"21:00–23:00",titolo:"Roseto Opera Prima – 30ª edizione",luogo:"Villa Comunale, Roseto degli Abruzzi",desc:"Rassegna culturale con proiezioni, incontri e spettacoli.",citta:"Roseto",tag:["Cultura","Cinema"],fonte:"https://www.visitroseto.it/eventi/"},
  {id:3,data:"10 Lug – 6 Set 2026",orario:"Tutto il giorno",titolo:"Villa in Arte",luogo:"Villa Comunale, Roseto degli Abruzzi",desc:"Mostra d'arte con grandi protagonisti dell'arte contemporanea.",citta:"Roseto",tag:["Cultura","Arte"],fonte:"https://www.visitroseto.it/eventi/"},

  {id:8,data:"22–26 Lug 2026",orario:"Dalle 19:00",titolo:"17ª Sagra 'De lu Stennmass'",luogo:"Cologna Paese, Roseto degli Abruzzi",desc:"Sagra enogastronomica con sapori e tradizioni del territorio.",citta:"Roseto",tag:["Enogastronomia","Sagra"],fonte:"https://www.visitroseto.it/eventi/"},
  {id:9,data:"24–25 Lug 2026",orario:"19:00",titolo:"Mons Pagus A.D. 1566 – Rievocazione Rinascimentale",luogo:"Borgo di Montepagano, Roseto degli Abruzzi",desc:"Rievocazione storica in costume.",citta:"Roseto",tag:["Cultura","Rievocazione"],fonte:"https://www.visitroseto.it/eventi/"},

  {id:18,data:"18 Lug 2026",orario:"Serale",titolo:"Power Mix RDS – Serata Disco",luogo:"Tortoreto",desc:"Serata dance con Power Mix RDS.",citta:"Tortoreto",tag:["Musica","Disco"],fonte:"https://www.vivitortoreto.it/resources/VIVITORTORETO-estate-2026.pdf"},
  {id:19,data:"28 Lug – 14 Ago 2026",orario:"Vari orari",titolo:"Concerti Estate Giulianova",luogo:"Giulianova",desc:"Vari concerti in programma. Biglietti su TicketOne.",citta:"Giulianova",tag:["Musica"],fonte:"https://www.ticketone.it/cityd/giulianova-1317/concerti-55/"},
  {id:20,data:"23 Lug 2026",orario:"20:00",titolo:"MOONJUNE in concerto",luogo:"Teramo",desc:"Concerto rock/pop.",citta:"Teramo",tag:["Musica"],fonte:"https://www.rockol.it/concerti-teramo-p-nxad4vo9d0o"}
];

function renderizza(lista){
  const container = document.getElementById('eventi');
  if(!lista.length){document.getElementById('nessun-risultato').style.display='block';container.innerHTML='';return}
  document.getElementById('nessun-risultato').style.display='none';
  
  const perComune = {};
  lista.forEach(e => {
    if(!perComune[e.citta]) perComune[e.citta] = [];
    perComune[e.citta].push(e);
  });
  
  let html = '';
  for(const [citta, evs] of Object.entries(perComune)){
    html += `<div class="intestazione-comune">📍 ${citta}</div>`;
    evs.forEach(e => {
      const orarioHtml = e.orario ? `<div class="orario">🕐 ${e.orario}</div>` : '';
      html += `<div class="evento">
        <a href="${e.fonte || '#'}" target="_blank" rel="noopener">
          <div class="data">${e.data}</div>
          ${orarioHtml}
          <div class="titolo">${e.titolo}</div>
          <div class="luogo">${e.luogo}</div>
          <div class="desc">${e.desc}</div>
          <div class="etichette">${e.tag.map(t=>`<span class="etichetta">${t}</span>`).join('')}</div>
        </a>
      </div>`;
    });
  }
  container.innerHTML = html;
  document.getElementById('stats').textContent = `${lista.length} eventi trovati`;
}

function filtra(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const filtroCitta = document.querySelector('#filtri .attivo')?.dataset?.filtro || 'tutti';
  
  const filtrati = eventi.filter(e => {
    if(filtroCitta !== 'tutti' && e.citta !== filtroCitta) return false;
    if(!q) return true;
    const testo = `${e.titolo} ${e.luogo} ${e.desc} ${e.data} ${e.tag.join(' ')}`.toLowerCase();
    return testo.includes(q);
  });
  renderizza(filtrati);
}

document.getElementById('search').addEventListener('input', filtra);
document.querySelectorAll('#filtri button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#filtri button').forEach(b => b.classList.remove('attivo'));
    btn.classList.add('attivo');
    filtra();
  });
});

document.getElementById('aggiornato').textContent = new Date().toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'});
renderizza(eventi);
</script>
</body>
</html>
